<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Montana Luxe | Store</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- Free Shipping Banner -->
    <section class="free-shipping">
        <p>FREE SHIPPING FOR ALL U.S. ORDERS OVER $75</p>
    </section>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <a href="html2.html">
                <img src="https://g1cc40-3b.myshopify.com/cdn/shop/files/i-want-a-website-logo-for-montana-style-based-from-tony-montana.png?height=72&v=1771606342" alt="Montana Luxe Logo">
            </a>
        </div>
        <nav class="nav">
            <a href="html2.html">Home</a>
            <a href="#">shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="p.mp4.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1>Welcome to Montana Luxe</h1>
            <p>Modern fashion. Simple elegance.</p>
            <a href="order-tshirt.html"><button>Shop Now</button></a>
        </div>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Our Collection</h2>

        <div class="product-grid">

            <!-- Product 1 -->
            <div class="product-card">
                <a href="product-tshirt-beige.html" class="product-link">
                    <div class="product-img">
                        <img src="t shirt 2.webp" alt="Tshirt Beige Nouvelle Collection">
                    </div>
                    <h3>Tshirt Beige – Nouvelle Collection</h3>
                    <p>3500 DA</p>
                </a>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <div class="product-img">
                    <video
                        playsinline
                        muted
                        preload="metadata"
                        poster="images/malik-poster.jpg"
                    >
                        <source src="videos/malik.mp4.mp4" type="video/mp4">
                        <img src="images/malik-poster.jpg" alt="Street Style">
                    </video>
                </div>
                <h3>Street Style</h3>
                <p>$45</p>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <div class="product-img">
                    <video
                        playsinline
                        muted
                        preload="metadata"
                        poster="images/malik-poster.jpg"
                    >
                        <source src="videos/malik.mp4.mp4" type="video/mp4">
                        <img src="images/malik-poster.jpg" alt="Classic Look">
                    </video>
                </div>
                <h3>Classic Look</h3>
                <p>$50</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Montana Luxe. All rights reserved.</p>
    </footer>

</body>
</html>
